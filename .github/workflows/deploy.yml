name: Deploy Voic.IA → Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js 24 com cache ────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Dependências ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Otimizar imagens PNG → WebP ─────────────────────────────
      - name: Optimize images
        run: |
          sudo apt-get install -y webp
          find public -name "*.png" | while read f; do
            out="${f%.png}.webp"
            if cwebp -q 85 "$f" -o "$out" 2>/dev/null; then
              echo "✅  $f → $out ($(du -k "$out" | cut -f1)KB)"
            else
              echo "⚠️  Skipped: $f"
            fi
          done
        continue-on-error: true

      # ── 5. Build estático Next.js → pasta out/ ─────────────────────
      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "📦 Arquivos gerados: $(find out -type f | wc -l)"
          ls -la out/

      # ── 6. Deploy paralelo via lftp ─────────────────────────────────
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (parallel)
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Escreve credenciais de forma segura (suporta caracteres especiais na senha)
          printf 'machine %s login %s password %s\n' \
            "$FTP_SERVER" "$FTP_USERNAME" "$FTP_PASSWORD" > ~/.netrc
          chmod 600 ~/.netrc

          # Deploy com 5 uploads simultâneos + remoção de arquivos obsoletos
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:passive-mode yes;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set net:limit-rate 0;
            mirror --reverse --delete --parallel=5 --verbose \
              ./out/ /public_html/;
            quit;
          " "ftp://$FTP_SERVER"

          # Remove credenciais da memória
          rm -f ~/.netrc
